%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=quarkus_test
%prod.quarkus.datasource.password=quarkus_test
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:15432/quarkus_test
%prod.quarkus.datasource.jdbc.max-size=8
%prod.quarkus.datasource.jdbc.min-size=2

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import.sql

quarkus.openapi.generator.spec=warehouse-openapi.yaml
quarkus.openapi.generator.base-package=com.warehouse.api

# ── Test HTTP port (fixed so Cucumber RestAssured steps can reach the server) ─
quarkus.http.test-port=8081

# ── JaCoCo (Quarkus test instrumentation) ────────────────────────────────────
# Merges @QuarkusTest coverage into the same exec file as unit tests
quarkus.jacoco.data-file=target/jacoco.exec
quarkus.jacoco.reuse-data-file=true
quarkus.jacoco.report=false

# ── OpenAPI / Swagger UI ─────────────────────────────────────────────────────# Metadata shown in the Swagger UI header
quarkus.smallrye-openapi.info-title=Warehouse Colocation API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API for managing warehouse colocation, fulfillment assignments, and store synchronisation.

# Make Swagger UI available in all profiles (dev, test, prod)
# Remove this line to restrict it to dev/test only
quarkus.swagger-ui.always-include=true

# Swagger UI lives at: http://localhost:8080/q/swagger-ui
# Raw OpenAPI JSON/YAML at: http://localhost:8080/q/openapi
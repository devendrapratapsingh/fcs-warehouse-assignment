name: CodeQL Security Analysis

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    # Re-scan every Monday at 08:00 UTC even without a push
    - cron: '0 8 * * 1'

jobs:
  analyze:
    name: Analyze (Java)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # required to upload SARIF results
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          # Built-in query suites:
          #   security-extended  → more security rules (recommended)
          #   security-and-quality → security + maintainability
          queries: security-extended

      # CodeQL needs to watch the build to trace the compiled bytecode
      - name: Build (no tests — CodeQL only needs compiled classes)
        working-directory: java-assignment
        run: ./mvnw package -DskipTests -B --no-transfer-progress

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
